/* ══════════════════════════════════════════════════
   PERSISTÊNCIA — localStorage
   Salva automaticamente a cada alteração.
   Os dados ficam gravados no navegador mesmo
   após fechar a página.
══════════════════════════════════════════════════ */
const STORAGE_KEY="apm_festa_junina_2026_v4";

function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d=JSON.parse(raw);
      if(Array.isArray(d.rec)&&Array.isArray(d.gas)){
        return{rec:d.rec,gas:d.gas,nextId:d.nextId||500,savedAt:d.savedAt||null};
      }
    }
  }catch(e){console.warn("Erro ao carregar dados salvos:",e);}
  return{rec:JSON.parse(JSON.stringify(RECEITAS_INIT)),gas:JSON.parse(JSON.stringify(GASTOS_INIT)),nextId:500,savedAt:null};
}

function saveData(){
  try{
    const payload={rec:S.rec,gas:S.gas,nextId:S.nextId,savedAt:new Date().toISOString()};
    localStorage.setItem(STORAGE_KEY,JSON.stringify(payload));
    S.lastSave=nowTime();
    const el=document.getElementById("save-ind");
    if(el) el.innerHTML=`💾 Salvo às ${S.lastSave}`;
    return true;
  }catch(e){
    console.error("Erro ao salvar:",e);
    toast("⚠ Erro ao salvar dados no navegador","#C0392B");
    return false;
  }
}

/* backup em arquivo JSON */
function backupJSON(){
  const payload={rec:S.rec,gas:S.gas,exportadoEm:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="Backup_FestaJunina2026_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  toast("✅ Backup JSON baixado!");
}
function restoreJSON(file){
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      if(Array.isArray(d.rec)&&Array.isArray(d.gas)){
        S.rec=d.rec;S.gas=d.gas;
        saveData();render();
        toast("✅ Backup restaurado com sucesso!");
      }else toast("Arquivo de backup inválido","#C0392B");
    }catch{toast("Erro ao ler o arquivo","#C0392B");}
  };
  rd.readAsText(file);
}
function resetData(){
  if(confirm("Isso vai APAGAR todos os dados salvos e voltar aos dados originais da festa. Deseja continuar?")){
    localStorage.removeItem(STORAGE_KEY);
    const d=loadData();
    S.rec=d.rec;S.gas=d.gas;S.nextId=d.nextId;
    saveData();render();
    toast("Dados restaurados ao original");
  }
}

function bandeirolas(){
  const c=["#E24B4A","#EF9F27","#1D9E75","#378ADD","#7F77DD","#D85A30"];

  for(let i=0;i<20;i++) s+=`<polygon points="${i*40+3},1 ${i*40+37},1 ${i*40+20},27" fill="${c[i%6]}" opacity="0.88"/>`;
  return s+"</svg>";
}

const fv=v=>{
  if(!v||v===0) return "";
  const a=Math.abs(v);
  if(a>=1000) return (v<0?"-":"")+"R$ "+(a/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+" mil";
  return "R$ "+v.toFixed(0);
};

/* ══════════════════════════════════════════════════
   BIND HANDLERS
══════════════════════════════════════════════════ */
function bindER(){
  document.querySelectorAll(".er").forEach(el=>el.addEventListener("input",e=>{
    const f=e.target.dataset.f;
    const v=(e.target.type==="number"||e.target.type==="range")?parseFloat(e.target.value)||0:e.target.value;
    S.erD={...S.erD,[f]:v};
    if(f==="pct") document.querySelectorAll(`.er[data-f="pct"]`).forEach(x=>{if(x!==e.target)x.value=v;});
    if(f==="receitaBruta"||f==="pct"){S.erD.apm=r2(S.erD.receitaBruta*S.erD.pct/100);S.erD.parceiro=r2(S.erD.receitaBruta*(100-S.erD.pct)/100);}
  }));
}
function bindEG(){
  document.querySelectorAll(".eg").forEach(el=>el.addEventListener("input",e=>{
    const f=e.target.dataset.f;
    S.egD={...S.egD,[f]:e.target.type==="number"?parseFloat(e.target.value)||0:e.target.value};
  }));
}

/* ══════════════════════════════════════════════════
   GRÁFICOS — BARRAS MAIORES E MAIS APRESENTÁVEIS
══════════════════════════════════════════════════ */
function drawCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch{}});charts={};
  Chart.register(ChartDataLabels);
  Chart.defaults.font.family="'Segoe UI',Arial,sans-serif";

  /* — Pizza Receitas — */
  const byTRec={};S.rec.forEach(r=>{byTRec[r.tipo]=(byTRec[r.tipo]||0)+r.apm;});
  const pieREntries=Object.entries(byTRec).filter(([,v])=>v>0);
  const pieRCols={"barraca":"#EF9F27","sorteio":"#7F77DD","gremio":"#68BB59"};
  const peEl=document.getElementById("pieR");
  if(peEl) charts.pieR=new Chart(peEl,{type:"doughnut",data:{
    labels:pieREntries.map(([k])=>TBADGE[k].label),
    datasets:[{data:pieREntries.map(([,v])=>v),backgroundColor:pieREntries.map(([k])=>pieRCols[k]||"#aaa"),borderWidth:3,borderColor:"#fff"}]
  },options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{
    legend:{display:false},
    tooltip:{callbacks:{label:c=>" "+BRL(c.raw)+" ("+((c.raw/pieREntries.reduce((a,[,v])=>a+v,0))*100).toFixed(1)+"%)"}},
    datalabels:{color:"#fff",font:{weight:"bold",size:12},formatter:(v)=>{
      const tot=pieREntries.reduce((a,[,x])=>a+x,0);const pct=(v/tot)*100;
      return pct>8?pct.toFixed(0)+"%":"";
    }}
  }}});

  /* — Pizza Gastos — */
  const byTGas={};S.gas.forEach(g=>{byTGas[g.tipo]=(byTGas[g.tipo]||0)+g.valor;});
  const GCOL={alimentacao:"#1D9E75",material:"#378ADD",decoracao:"#3B8C28",servico:"#EF9F27",premio:"#D85A30",outro:"#888"};
  const gasEnt=Object.entries(byTGas).sort((a,b)=>b[1]-a[1]);
  const pgEl=document.getElementById("pieG");
  if(pgEl) charts.pieG=new Chart(pgEl,{type:"doughnut",data:{
    labels:gasEnt.map(([k])=>TBADGE[k]?.label||k),
    datasets:[{data:gasEnt.map(([,v])=>r2(v)),backgroundColor:gasEnt.map(([k])=>GCOL[k]||"#888"),borderWidth:3,borderColor:"#fff"}]
  },options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{
    legend:{display:false},
    tooltip:{callbacks:{label:c=>" "+BRL(c.raw)}},
    datalabels:{color:"#fff",font:{weight:"bold",size:12},formatter:(v)=>{
      const tot=gasEnt.reduce((a,[,x])=>a+x,0);const pct=(v/tot)*100;
      return pct>8?pct.toFixed(0)+"%":"";
    }}
  }}});

  /* — BARRAS GRANDES: Receita por barraca —
     Barras mais espessas, mais espaçamento, valores fixos
     grandes ao lado de cada barra, ordenado por receita */
  const bd=[...S.rec.filter(r=>r.tipo==="barraca")].sort((a,b)=>b.receitaBruta-a.receitaBruta);
  const brEl=document.getElementById("barR");
  if(brEl) charts.barR=new Chart(brEl,{type:"bar",data:{
    labels:bd.map(r=>r.responsavel.length>22?r.responsavel.substring(0,20)+"…":r.responsavel),
    datasets:[
      {label:"Receita bruta",data:bd.map(r=>r.receitaBruta),backgroundColor:"#EF9F27",borderRadius:5,barPercentage:0.85,categoryPercentage:0.78},
      {label:"APM",data:bd.map(r=>r2(r.apm)),backgroundColor:"#1D9E75",borderRadius:5,barPercentage:0.85,categoryPercentage:0.78},
      {label:"Parceiro",data:bd.map(r=>r2(r.parceiro)),backgroundColor:"#9B59B6",borderRadius:5,barPercentage:0.85,categoryPercentage:0.78},
    ]
  },options:{
    indexAxis:"y",responsive:true,maintainAspectRatio:false,
    layout:{padding:{right:110,top:6,bottom:6}},
    plugins:{
      legend:{display:false},
      tooltip:{
        padding:12,titleFont:{size:14,weight:"bold"},bodyFont:{size:13},
        callbacks:{label:c=>" "+c.dataset.label+": "+BRL(c.raw)}
      },
      datalabels:{
        anchor:"end",align:"right",clamp:false,clip:false,
        formatter:v=>v>0?fv(v):"",
        font:{weight:"bold",size:12},
        color:ctx=>["#BA7517","#0F6E56","#6C3483"][ctx.datasetIndex]||"#333",
        padding:{left:6}
      }
    },
    scales:{
      x:{
        grid:{color:"rgba(0,0,0,0.06)"},
        ticks:{font:{size:12},callback:v=>fv(v),color:"#888"},
        border:{display:false}
      },
      y:{
        grid:{display:false},
        ticks:{font:{size:13,weight:"600"},color:"#444"},
        border:{display:false}
      }
    }
  }});

  /* — Comparativo grande com valores fixos — */
  const t=tots();
  const ccEl=document.getElementById("compC");
  const compColors=["#1D9E75","#D85A30",t.saldo>=0?"#378ADD":"#E24B4A"];
  if(ccEl) charts.compC=new Chart(ccEl,{type:"bar",data:{
    labels:["Receita APM","Total Gastos","Saldo Final"],
    datasets:[{data:[t.apm,t.gas,t.saldo],backgroundColor:compColors,borderRadius:8,barPercentage:0.55}]
  },options:{
    responsive:true,maintainAspectRatio:false,
    layout:{padding:{top:38}},
    plugins:{
      legend:{display:false},
      tooltip:{padding:12,callbacks:{label:c=>" "+BRL(c.raw)}},
      datalabels:{
        anchor:"end",align:"top",clamp:false,
        formatter:v=>BRL(v),
        font:{weight:"bold",size:14},
        color:ctx=>compColors[ctx.dataIndex]
      }
    },
    scales:{
      x:{grid:{display:false},ticks:{font:{size:13,weight:"600"},color:"#444"},border:{display:false}},
      y:{grid:{color:"rgba(0,0,0,0.06)"},ticks:{font:{size:12},callback:v=>fv(v),color:"#888"},border:{display:false}}
    }
  }});
}

    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});

      {label:"Total Gastos",value:BRL(t.gas),sub:S.gas.length+" notas",c:[216,90,48]},
      {label:"Saldo Final",value:BRL(t.saldo),sub:ok?"SUPERÁVIT":"DÉFICIT",c:ok?[55,138,221]:[226,75,74]},
    ];
    const cw=(W-20)/3;
    cards.forEach((cd,i)=>{

      doc.setFillColor(250,250,250);doc.roundedRect(x,y,cw-3,20,2,2,"F");

      doc.setFontSize(13);doc.setFont("helvetica","bold");doc.setTextColor(cd.c[0],cd.c[1],cd.c[2]);doc.text(cd.value,x+4,y+13);

    });
    y+=28;
    doc.setFontSize(12);doc.setFont("helvetica","bold");doc.setTextColor(8,80,65);doc.text("RECEITAS",10,y);y+=3;
    doc.autoTable({
      startY:y,
      head:[["Responsável / Barraca","Data","Tipo","Receita Bruta","% APM","APM (R$)","Parceiro (R$)"]],
      body:S.rec.map(r=>[r.responsavel,r.data,TBADGE[r.tipo]?.label||r.tipo,BRL(r.receitaBruta),r.pct+"%",BRL(r.apm),BRL(r.parceiro)]),
      foot:[["TOTAIS ("+S.rec.length+" entradas)","","",BRL(t.bruta),"",BRL(t.apm),BRL(t.parc)]],
      theme:"grid",styles:{fontSize:8,cellPadding:2.5,overflow:"linebreak"},
      headStyles:{fillColor:[30,158,117],textColor:255,fontStyle:"bold",fontSize:8},
      footStyles:{fillColor:[225,245,238],fontStyle:"bold",textColor:[8,80,65]},
      columnStyles:{0:{cellWidth:52},1:{cellWidth:18},2:{cellWidth:18},3:{cellWidth:22,halign:"right"},4:{cellWidth:12,halign:"center"},5:{cellWidth:22,halign:"right"},6:{cellWidth:22,halign:"right"}},
      alternateRowStyles:{fillColor:[250,254,252]},
    });
    doc.setFontSize(12);doc.setFont("helvetica","bold");doc.setTextColor(153,60,29);doc.text("GASTOS",10,doc.lastAutoTable.finalY+8);
    doc.autoTable({
      startY:doc.lastAutoTable.finalY+11,
      head:[["Descrição","Fornecedor","Data","Valor (R$)","Tipo"]],
      body:S.gas.map(g=>[g.descricao.substring(0,60)+(g.descricao.length>60?"…":""),g.fornecedor.substring(0,35),g.data,BRL(g.valor),TBADGE[g.tipo]?.label||g.tipo]),
      foot:[["TOTAL GASTOS ("+S.gas.length+" lançamentos)","","",BRL(t.gas),""]],
      theme:"grid",styles:{fontSize:8,cellPadding:2.5,overflow:"linebreak"},
      headStyles:{fillColor:[216,90,48],textColor:255,fontStyle:"bold",fontSize:8},
      footStyles:{fillColor:[250,236,231],fontStyle:"bold",textColor:[153,60,29]},
      columnStyles:{0:{cellWidth:68},1:{cellWidth:42},2:{cellWidth:18},3:{cellWidth:24,halign:"right"},4:{cellWidth:18}},
      alternateRowStyles:{fillColor:[255,252,250]},
    });
    const fy=doc.lastAutoTable.finalY+10;
    if(fy>260) doc.addPage();
    const ry=fy>260?20:fy;
    const rc=ok?[30,158,117]:[226,75,74];
    doc.setFillColor(ok?225:250,ok?245:236,ok?238:231);doc.roundedRect(10,ry,W-20,22,3,3,"F");
    doc.setDrawColor(rc[0],rc[1],rc[2]);doc.setLineWidth(0.8);doc.roundedRect(10,ry,W-20,22,3,3,"S");

    doc.text("RESULTADO FINAL: "+(ok?"SUPERÁVIT":"DÉFICIT"),14,ry+7);
    doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(60,60,60);
    doc.text("Receita APM: "+BRL(t.apm)+"   |   Gastos: "+BRL(t.gas)+"   |   Saldo: "+BRL(t.saldo),14,ry+14);
    doc.setFontSize(8);doc.setTextColor(170,170,170);
    doc.text("APM ITB Brasílio Flores de Azevedo · Gerado em "+now(),W/2,ry+20,{align:"center"});
    doc.save("Balanco_FestaJunina2026_APM_ITB.pdf");
    toast("✅ PDF exportado com sucesso!");
  }catch(e){console.error(e);toast("Erro ao gerar PDF: "+e.message,"#C0392B");}
};

    XLSX.utils.book_append_sheet(wb,wsGas,"Gastos");
    const byT2={};S.gas.forEach(g=>{byT2[g.tipo]=(byT2[g.tipo]||0)+g.valor;});
    const resRows=[
      ["BALANÇO CONSOLIDADO — FESTA JUNINA 2026 · APM ITB",""],
      ["Escola Brasílio Flores de Azevedo · Gerado em "+now(),""],
      [],
      ["RECEITAS",""],
      ["Receita bruta total",t.bruta],
      ["Receita APM total",t.apm],
      ["Total parceiros",t.parc],
      [],
      ["GASTOS",""],
      ["Total de gastos",t.gas],
      ["Número de notas",S.gas.length],
      [],
      ["RESULTADO",""],
      ["Saldo final",t.saldo],
      ["Resultado",t.saldo>=0?"SUPERÁVIT":"DÉFICIT"],
      [],
      ["DETALHAMENTO GASTOS POR TIPO",""],
      ["Tipo","Valor (R$)"],
      ...Object.entries(byT2).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[TBADGE[k]?.label||k,v]),

/* ══════════════════════════════════════════════════

window.sT=t=>{S.tab=t;render();};
window.sER=id=>{S.erI=id;S.erD={...S.rec.find(r=>r.id===id)};render();};
window.saveR=()=>{S.rec=S.rec.map(r=>r.id===S.erI?S.erD:r);S.erI=null;S.erD=null;saveData();render();toast("Receita atualizada e salva!");};
window.cancelR=()=>{S.erI=null;S.erD=null;render();};
window.delR=id=>{if(confirm("Remover esta receita?")){S.rec=S.rec.filter(r=>r.id!==id);saveData();render();toast("Receita removida");}};
window.setNrTipo=tp=>{S.nr.tipo=tp;render();};
window.clearNr=()=>{S.nr={responsavel:"",data:"",receitaBruta:"",pct:25,tipo:"barraca"};render();};
window.addR=()=>{
  const resp=document.getElementById("nr-resp")?.value||"";
  const data=document.getElementById("nr-data")?.value||"—";
  const rb=parseFloat(document.getElementById("nr-rb")?.value)||0;
  const pct=parseFloat(document.getElementById("nr-pct-num")?.value)||0;
  if(!resp||rb<=0){alert("Preencha responsável e receita bruta.");return;}
  S.rec=[...S.rec,{id:S.nextId++,responsavel:resp,data,receitaBruta:rb,parceiro:r2(rb*(100-pct)/100),apm:r2(rb*pct/100),pct,tipo:S.nr.tipo}];
  S.nr={responsavel:"",data:"",receitaBruta:"",pct:25,tipo:"barraca"};
  saveData();render();toast("✅ Receita adicionada e salva!");
};
window.updPreview=function(){
  const rb=parseFloat(S.nr.receitaBruta)||0;
  const pct=parseFloat(S.nr.pct)||0;
  const get=id=>document.getElementById(id);
  if(get("prev-rb")) get("prev-rb").textContent=BRL(rb);
  if(get("prev-apm")){get("prev-apm").textContent=BRL(r2(rb*pct/100));get("prev-apm-lbl").textContent=`APM recebe (${pct}%)`;}
  if(get("prev-parc")){get("prev-parc").textContent=BRL(r2(rb*(100-pct)/100));get("prev-parc-lbl").textContent=`Parceiro recebe (${100-pct}%)`;}
  if(get("nr-pct-lbl")) get("nr-pct-lbl").textContent=pct+"%";
  if(get("nr-parc-pct-lbl")) get("nr-parc-pct-lbl").textContent=(100-pct)+"%";
};
window.sEG=id=>{S.egI=id;S.egD={...S.gas.find(g=>g.id==id)};render();};
window.saveG=()=>{S.gas=S.gas.map(g=>g.id===S.egI?S.egD:g);S.egI=null;S.egD=null;saveData();render();toast("Gasto atualizado e salvo!");};
window.cancelG=()=>{S.egI=null;S.egD=null;render();};
window.delG=id=>{if(confirm("Remover este lançamento?")){S.gas=S.gas.filter(g=>g.id!=id);saveData();render();toast("Gasto removido");}};
window.addM=()=>{
  const desc=document.getElementById("nd")?.value||"";
  const forn=document.getElementById("nf")?.value||"";
  const data=document.getElementById("ndt")?.value||"—";
  const valor=parseFloat(document.getElementById("nv")?.value)||0;
  const tipo=document.getElementById("nt")?.value||"outro";
  if(!desc&&!valor) return;
  S.gas=[...S.gas,{id:"m"+Date.now(),descricao:desc||"Sem descrição",fornecedor:forn||"—",valor,data,tipo,origem:"Manual"}];
  S.ng={desc:"",forn:"",data:"",valor:"",tipo:"alimentacao"};
  saveData();render();toast("✅ Gasto adicionado e salvo!");
};
window.hF=async files=>{
  if(!files?.length) return;
  for(const f of Array.from(files)){
    S.proc++;render();
    await new Promise(res=>{
      const rd=new FileReader();
      rd.onloadend=async()=>{
        const b64=rd.result.split(",")[1];
        try{
          const rp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:f.type||"image/jpeg",data:b64}},{type:"text",text:'Analise o recibo. Retorne SOMENTE JSON válido: {"descricao":"desc breve","fornecedor":"estabelecimento","valor":0.00,"data":"DD/MM/YYYY ou null","tipo":"alimentacao|material|decoracao|servico|premio|outro"}'}]}]})});
          const d=await rp.json();
          const p=JSON.parse((d.content?.[0]?.text||"{}").replace(/```json\n?|```/g,"").trim());
          S.gas=[...S.gas,{id:"ai"+Date.now(),descricao:p.descricao||f.name,fornecedor:p.fornecedor||"—",valor:r2(p.valor)||0,data:p.data||"—",tipo:p.tipo||"outro",origem:"IA — "+f.name}];
          saveData();
          toast("✅ Recibo processado e salvo: "+f.name);
        }catch{
          S.gas=[...S.gas,{id:"ai"+Date.now(),descricao:"Recibo — "+f.name,fornecedor:"Verificar manualmente",valor:0,data:"—",tipo:"outro",origem:f.name}];
          saveData();
        }
        S.proc--;render();res();
      };rd.readAsDataURL(f);
    });
  }
};

/* Salva também antes de fechar a página, por garantia */
window.addEventListener("beforeunload",()=>{try{saveData();}catch{}});

render();
/* Salva o estado inicial na primeira abertura */
if(!loaded.savedAt) saveData();
</script>
