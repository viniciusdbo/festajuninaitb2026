<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Eventos — APM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#EFF3F8;color:#141a22;min-height:100vh;}
input,select{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#141a22;width:100%;}
input:focus,select:focus{outline:2px solid #2E86C1;outline-offset:1px;border-color:#2E86C1;}
input[type=range]{padding:4px 0;border:none;background:transparent;accent-color:#2E86C1;cursor:pointer;}
button{font-family:inherit;cursor:pointer;}
.btn{font-size:13px;padding:6px 14px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#333;transition:background .15s;}
.btn:hover{background:#f5f5f5;}
.btn-teal{background:#E1F5EE;color:#085041;border-color:#9FE1CB;}.btn-teal:hover{background:#9FE1CB;}
.btn-coral{background:#FAECE7;color:#712B13;border-color:#F5C4B3;}.btn-coral:hover{background:#F5C4B3;}
.btn-blue{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4;}.btn-blue:hover{background:#B5D4F4;}
.btn-green{background:#1D9E75;color:#fff;border:none;}.btn-green:hover{background:#0F6E56;}
.btn-primary{background:#2E86C1;color:#fff;border:none;}.btn-primary:hover{background:#21618C;}
.btn-pdf{background:#C0392B;color:#fff;border:none;}.btn-pdf:hover{background:#96281B;}
.btn-xlsx{background:#1D6A36;color:#fff;border:none;}.btn-xlsx:hover{background:#155228;}
.btn-ghost{background:transparent;border:1px solid rgba(30,70,110,.3);color:#21618C;font-size:11px;}.btn-ghost:hover{background:rgba(46,134,193,.1);}
.card{background:#fff;border:1px solid #dde5ee;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.card-green{border:1px solid #9FE1CB;background:#FAFFFE;}
.card-blue{border:1px solid #AED6F1;background:#FAFDFF;}
.header{background:linear-gradient(135deg,#1A5276 0%,#2E86C1 100%);padding:16px 24px 0;color:#fff;}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px;}
.header-info{display:flex;align-items:center;gap:12px;}
.header-title{font-size:20px;font-weight:700;color:#fff;}
.header-sub{font-size:12px;color:#AED6F1;margin-top:2px;}
.export-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.save-indicator{font-size:11px;color:#A9DFBF;font-weight:600;display:flex;align-items:center;gap:4px;}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 24px;}
.scard{background:#fff;border-radius:10px;padding:16px;border-left:4px solid;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.scard-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#777;margin-bottom:6px;}
.scard-value{font-size:22px;font-weight:700;}
.scard-sub{font-size:12px;color:#777;margin-top:3px;}
.tabs{display:flex;gap:0;padding:0 24px;border-bottom:2px solid #AED6F1;background:#EFF3F8;flex-wrap:wrap;}
.tab{padding:10px 18px;border:none;background:transparent;font-size:14px;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;}
.tab.active{color:#1A5276;border-bottom:2px solid #2E86C1;font-weight:700;}
.tab:hover{color:#1A5276;}
.content{padding:20px 24px;}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #dde5ee;border-radius:12px;overflow:hidden;}
th{text-align:left;font-size:12px;font-weight:600;color:#555;padding:10px 12px;border-bottom:1px solid #dde5ee;background:#F7FAFC;}
td{font-size:13px;padding:9px 12px;border-bottom:1px solid #edf2f7;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#F7FBFF;}
tfoot td{background:#F0F6FC;font-weight:700;border-top:2px solid #dde5ee;}
label{font-size:11px;color:#666;display:block;margin-bottom:3px;}
.badge{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px;}
.upload-zone{border:2px dashed #85C1E9;border-radius:10px;padding:22px;text-align:center;cursor:pointer;background:#EBF5FB44;transition:background .15s;}
.upload-zone:hover{background:#EBF5FB;}
.preview-box{background:#F0FDF4;border:1px solid #9FE1CB;border-radius:8px;padding:10px 14px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
.preview-item{text-align:center;}
.preview-label{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#777;margin-bottom:2px;}
.preview-value{font-size:16px;font-weight:700;}
.pct-row{display:flex;align-items:center;gap:10px;}
.pct-row input[type=number]{width:65px;flex-shrink:0;}
.pct-row input[type=range]{flex:1;}
.pct-row span{font-size:14px;color:#666;font-weight:600;min-width:30px;}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.tipo-btn{padding:4px 12px;border-radius:999px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;transition:all .15s;}
.tipo-btn.active-barraca{background:#FAEEDA;color:#854F0B;border-color:#FAC775;font-weight:600;}
.tipo-btn.active-sorteio{background:#EEEDFE;color:#3C3489;border-color:#C4C2F7;font-weight:600;}
.tipo-btn.active-ingresso{background:#E1F5EE;color:#085041;border-color:#9FE1CB;font-weight:600;}
.tipo-btn.active-doacao{background:#FCE7F3;color:#9D174D;border-color:#F5B7D5;font-weight:600;}
.tipo-btn.active-outro{background:#F1EFE8;color:#444441;border-color:#ccc;font-weight:600;}
.chart-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
.chart-legend span{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;}
.ldot{width:12px;height:12px;border-radius:3px;display:inline-block;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.stat-box{background:#fff;border:1px solid #dde5ee;border-radius:8px;padding:12px;text-align:center;}
.stat-val{font-size:18px;font-weight:700;margin-bottom:2px;}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#888;}
.toast{position:fixed;bottom:20px;right:20px;background:#1D9E75;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:14px;padding:26px;max-width:520px;width:92%;box-shadow:0 10px 40px rgba(0,0,0,.25);}
@media(max-width:700px){
  .summary,.grid2,.grid3,.stat-grid{grid-template-columns:1fr;}
  .header-top{flex-direction:column;align-items:flex-start;}
}
@media print{
  body{background:#fff;}
  .tabs,.btn,.export-btns,input,select,.upload-zone,.add-form,.tag-row,.pct-row,.tipo-btn{display:none!important;}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const BRL=v=>(parseFloat(v)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const r2=v=>Math.round((parseFloat(v)||0)*100)/100;
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const now=()=>new Date().toLocaleDateString("pt-BR");
const nowTime=()=>new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

function toast(msg,color="#1D9E75"){
  const el=document.getElementById("toast");
  el.textContent=msg;el.style.background=color;el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),3000);
}

/* ══════════════════════════════════════════════════
   TIPOS
══════════════════════════════════════════════════ */
const TBADGE={
  barraca:{bg:"#FAEEDA",color:"#854F0B",label:"Barraca"},
  sorteio:{bg:"#EEEDFE",color:"#3C3489",label:"Sorteio/Rifa"},
  ingresso:{bg:"#E1F5EE",color:"#085041",label:"Ingresso"},
  doacao:{bg:"#FCE7F3",color:"#9D174D",label:"Doação"},
  outro_rec:{bg:"#F1EFE8",color:"#444441",label:"Outro"},
  alimentacao:{bg:"#E1F5EE",color:"#085041",label:"Alimentação"},
  material:{bg:"#E6F1FB",color:"#0C447C",label:"Material"},
  servico:{bg:"#FAEEDA",color:"#854F0B",label:"Serviço"},
  decoracao:{bg:"#EAF3DE",color:"#166534",label:"Decoração"},
  premio:{bg:"#FCE7F3",color:"#9D174D",label:"Prêmio"},
  estrutura:{bg:"#EDE7F6",color:"#4527A0",label:"Estrutura"},
  outro:{bg:"#F1EFE8",color:"#444441",label:"Outro"},
};
const badge=t=>{const s=TBADGE[t]||TBADGE.outro;return`<span class="badge" style="background:${s.bg};color:${s.color};">${s.label}</span>`;};
const gastoOpts=sel=>["alimentacao","material","decoracao","servico","premio","estrutura","outro"].map(t=>`<option value="${t}"${t===sel?" selected":""}>${TBADGE[t].label}</option>`).join("");
const REC_TIPOS=["barraca","sorteio","ingresso","doacao","outro_rec"];
const REC_LABELS={barraca:"🏪 Barraca",sorteio:"🎟 Sorteio/Rifa",ingresso:"🎫 Ingresso",doacao:"💝 Doação",outro_rec:"📦 Outro"};
const REC_COLORS={barraca:"#EF9F27",sorteio:"#7F77DD",ingresso:"#1D9E75",doacao:"#E74C8B",outro_rec:"#888"};

/* ══════════════════════════════════════════════════
   PERSISTÊNCIA
══════════════════════════════════════════════════ */
const STORAGE_KEY="apm_dashboard_eventos_v1";

function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d=JSON.parse(raw);
      if(d.cfg&&Array.isArray(d.rec)&&Array.isArray(d.gas)) return d;
    }
  }catch(e){console.warn(e);}
  return{
    cfg:{nome:"",org:"",periodo:"",emoji:"🎉",configured:false},
    rec:[],gas:[],nextId:1,savedAt:null
  };
}function salvarDados() {
  const dados = {
    produto: "Pão Francês",
    quantidade: 2.165,
    valor: 40.92,
    pagamento: "Dinheiro"
  };

  fetch("https://script.google.com/macros/s/AKfycbxsIIQAvUMjkkmMnjePaLQqmsLPvwiOTGUcWYc58oBwV6H6DflN4x7ycrEgbSFpEwu1BQ/exec", {
    method: "POST",
    body: JSON.stringify(dados)
  })
  .then(res => res.text())
  .then(msg => console.log(msg))
  .catch(err => console.error(err));
function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({cfg:S.cfg,rec:S.rec,gas:S.gas,nextId:S.nextId,savedAt:new Date().toISOString()}));
    S.lastSave=nowTime();
    const el=document.getElementById("save-ind");
    if(el) el.innerHTML=`💾 Salvo às ${S.lastSave}`;
    return true;
  }catch(e){toast("⚠ Erro ao salvar","#C0392B");return false;}
}
function backupJSON(){
  const blob=new Blob([JSON.stringify({cfg:S.cfg,rec:S.rec,gas:S.gas,exportadoEm:new Date().toISOString()},null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="Backup_"+(S.cfg.nome||"Evento").replace(/\s+/g,"_")+"_"+new Date().toISOString().slice(0,10)+".json";
  a.click();toast("✅ Backup baixado!");
}
function restoreJSON(file){
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      if(Array.isArray(d.rec)&&Array.isArray(d.gas)){
        S.rec=d.rec;S.gas=d.gas;if(d.cfg)S.cfg=d.cfg;
        saveData();render();toast("✅ Backup restaurado!");
      }else toast("Arquivo inválido","#C0392B");
    }catch{toast("Erro ao ler arquivo","#C0392B");}
  };
  rd.readAsText(file);
}
function resetData(){
  if(confirm("Isso vai APAGAR todos os dados deste evento (receitas, gastos e configuração). Deseja continuar?")){
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}
function novoEvento(){
  if(confirm("Iniciar um NOVO evento? Os dados atuais serão apagados. Faça um backup antes se quiser guardar!")){
    S.rec=[];S.gas=[];S.cfg.configured=false;
    saveData();render();
  }
}

/* ══════════════════════════════════════════════════
   ESTADO
══════════════════════════════════════════════════ */
const loaded=loadData();
let S={
  tab:"resumo",
  cfg:loaded.cfg,
  rec:loaded.rec,gas:loaded.gas,nextId:loaded.nextId||1,
  lastSave:loaded.savedAt?new Date(loaded.savedAt).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):null,
  erI:null,erD:null,egI:null,egD:null,
  nr:{responsavel:"",data:"",receitaBruta:"",pct:25,tipo:"barraca"},
  ng:{desc:"",forn:"",data:"",valor:"",tipo:"material"},
  proc:0,
};
let charts={};

const tots=()=>{
  const apm=r2(S.rec.reduce((a,r)=>a+r.apm,0));
  const bruta=r2(S.rec.reduce((a,r)=>a+r.receitaBruta,0));
  const parc=r2(S.rec.reduce((a,r)=>a+r.parceiro,0));
  const gas=r2(S.gas.reduce((a,g)=>a+g.valor,0));
  return{apm,bruta,parc,gas,saldo:r2(apm-gas)};
};

const fv=v=>{
  if(!v||v===0) return "";
  const a=Math.abs(v);
  if(a>=1000) return (v<0?"-":"")+"R$ "+(a/1000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+" mil";
  return "R$ "+v.toFixed(0);
};

/* ══════════════════════════════════════════════════
   TELA DE CONFIGURAÇÃO INICIAL
══════════════════════════════════════════════════ */
function renderSetup(){
  const emojis=["🎉","🎪","🎊","🎓","🎄","🎃","💐","⚽","🎭","🎂","🌸","☀️"];
  return`
  <div class="modal-bg">
    <div class="modal">
      <div style="text-align:center;margin-bottom:18px;">
        <div style="font-size:44px;margin-bottom:8px;">${S.cfg.emoji||"🎉"}</div>
        <div style="font-size:19px;font-weight:700;color:#1A5276;">Configurar novo evento</div>
        <div style="font-size:13px;color:#888;margin-top:4px;">Preencha os dados abaixo para começar</div>
      </div>
      <div style="display:grid;gap:12px;">
        <div>
          <label>Nome do evento *</label>
          <input id="cfg-nome" value="${esc(S.cfg.nome)}" placeholder="Ex: Festa da Primavera 2026">
        </div>
        <div>
          <label>Escola / Organização</label>
          <input id="cfg-org" value="${esc(S.cfg.org)}" placeholder="Ex: APM ITB Brasílio Flores de Azevedo">
        </div>
        <div>
          <label>Período / Data do evento</label>
          <input id="cfg-periodo" value="${esc(S.cfg.periodo)}" placeholder="Ex: 20 a 22/09/2026">
        </div>
        <div>
          <label>Ícone do evento</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
            ${emojis.map(e=>`<button class="btn" onclick="pickEmoji('${e}')" style="font-size:20px;padding:6px 10px;${S.cfg.emoji===e?"background:#D6EAF8;border-color:#2E86C1;":""}">${e}</button>`).join("")}
          </div>
        </div>
        <button class="btn btn-primary" onclick="salvarConfig()" style="padding:11px;font-size:15px;font-weight:600;margin-top:6px;">✓ Criar dashboard do evento</button>
        <div style="text-align:center;">
          <button class="btn btn-ghost" onclick="document.getElementById('restoreInputSetup').click()" style="font-size:12px;">📂 Ou restaurar de um backup anterior</button>
          <input id="restoreInputSetup" type="file" accept="application/json" style="display:none;" onchange="if(this.files[0])restoreJSON(this.files[0])">
        </div>
      </div>
    </div>
  </div>`;
}
window.pickEmoji=e=>{S.cfg.emoji=e;render();};
window.salvarConfig=()=>{
  const nome=document.getElementById("cfg-nome")?.value?.trim();
  if(!nome){alert("Informe o nome do evento.");return;}
  S.cfg.nome=nome;
  S.cfg.org=document.getElementById("cfg-org")?.value||"";
  S.cfg.periodo=document.getElementById("cfg-periodo")?.value||"";
  S.cfg.configured=true;
  saveData();render();toast("✅ Evento criado!");
};
window.editarConfig=()=>{S.cfg.configured=false;render();};

/* ══════════════════════════════════════════════════
   TAB: RESUMO
══════════════════════════════════════════════════ */
function renderResumo(t){
  if(S.rec.length===0&&S.gas.length===0){
    return`<div style="text-align:center;padding:60px 20px;color:#888;">
      <div style="font-size:48px;margin-bottom:12px;">${S.cfg.emoji}</div>
      <div style="font-size:17px;font-weight:600;color:#555;margin-bottom:6px;">Dashboard pronto para o evento!</div>
      <div style="font-size:14px;margin-bottom:20px;">Comece adicionando as receitas e os gastos nas abas acima.</div>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button class="btn btn-green" onclick="sT('receitas')" style="padding:10px 20px;">💰 Adicionar receitas</button>
        <button class="btn btn-coral" onclick="sT('gastos')" style="padding:10px 20px;border:1px solid #F5C4B3;">🧾 Lançar gastos</button>
      </div>
    </div>`;
  }
  const byTRec={};S.rec.forEach(r=>{byTRec[r.tipo]=(byTRec[r.tipo]||0)+r.apm;});
  const byTGas={};S.gas.forEach(g=>{byTGas[g.tipo]=(byTGas[g.tipo]||0)+g.valor;});
  const gasEnt=Object.entries(byTGas).sort((a,b)=>b[1]-a[1]);
  const GCOL={alimentacao:"#1D9E75",material:"#378ADD",decoracao:"#3B8C28",servico:"#EF9F27",premio:"#D85A30",estrutura:"#7D3C98",outro:"#888"};
  const bd=S.rec.filter(r=>r.tipo==="barraca");
  return`
  <div class="stat-grid" style="margin-bottom:20px;">
    <div class="stat-box"><div class="stat-val" style="color:#0F6E56;">${S.rec.length}</div><div class="stat-lbl">Fontes de receita</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#854F0B;">${bd.length}</div><div class="stat-lbl">Barracas</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#993C1D;">${S.gas.length}</div><div class="stat-lbl">Notas de gasto</div></div>
    <div class="stat-box"><div class="stat-val" style="color:${t.saldo>=0?"#185FA5":"#A32D2D"};">${t.saldo>=0?"Superávit":"Déficit"}</div><div class="stat-lbl">Resultado</div></div>
  </div>

  <div class="grid2" style="margin-bottom:20px;">
    <div class="card">
      <div class="section-title">Receita da organização por categoria</div>
      <div class="chart-legend">
        ${Object.entries(byTRec).filter(([,v])=>v>0).map(([k,v])=>`<span><span class="ldot" style="background:${REC_COLORS[k]||"#888"};"></span>${TBADGE[k]?.label||k} — ${BRL(v)}</span>`).join("")||"<span style='color:#aaa;font-size:12px;'>Sem receitas ainda</span>"}
      </div>
      <div style="position:relative;height:210px;"><canvas id="pieR"></canvas></div>
    </div>
    <div class="card">
      <div class="section-title">Gastos por categoria</div>
      <div class="chart-legend" style="gap:10px;">${gasEnt.map(([k,v])=>`<span style="font-size:12px;"><span class="ldot" style="width:10px;height:10px;background:${GCOL[k]||"#888"};"></span>${TBADGE[k]?.label||k} — ${BRL(v)}</span>`).join("")||"<span style='color:#aaa;font-size:12px;'>Sem gastos ainda</span>"}</div>
      <div style="position:relative;height:210px;"><canvas id="pieG"></canvas></div>
    </div>
  </div>

  ${bd.length>0?`
  <div class="card" style="margin-bottom:20px;padding:24px;">
    <div style="font-size:17px;font-weight:700;color:#333;">Receita por barraca</div>
    <div style="font-size:12px;color:#999;margin-top:2px;margin-bottom:12px;">Comparativo entre receita bruta, repasse à organização e parte do parceiro</div>
    <div class="chart-legend">
      <span><span class="ldot" style="background:#EF9F27;"></span>Receita bruta</span>
      <span><span class="ldot" style="background:#1D9E75;"></span>Organização</span>
      <span><span class="ldot" style="background:#9B59B6;"></span>Parceiro</span>
    </div>

/* ══════════════════════════════════════════════════
   BIND
══════════════════════════════════════════════════ */
function bindER(){
  document.querySelectorAll(".er").forEach(el=>el.addEventListener("input",e=>{
    const f=e.target.dataset.f;
    const v=(e.target.type==="number"||e.target.type==="range")?parseFloat(e.target.value)||0:e.target.value;
    S.erD={...S.erD,[f]:v};
    if(f==="pct") document.querySelectorAll(`.er[data-f="pct"]`).forEach(x=>{if(x!==e.target)x.value=v;});
    if(f==="receitaBruta"||f==="pct"){S.erD.apm=r2(S.erD.receitaBruta*S.erD.pct/100);S.erD.parceiro=r2(S.erD.receitaBruta*(100-S.erD.pct)/100);}
  }));
}
function bindEG(){
  document.querySelectorAll(".eg").forEach(el=>el.addEventListener("input",e=>{
    const f=e.target.dataset.f;
    S.egD={...S.egD,[f]:e.target.type==="number"?parseFloat(e.target.value)||0:e.target.value};
  }));
}

        <button class="btn btn-ghost" onclick="novoEvento()" style="color:#AED6F1;border-color:rgba(255,255,255,.3);">✨ Novo evento</button>

      </div>

    <div style="height:6px;background:linear-gradient(90deg,#E74C3C,#F39C12,#2ECC71,#3498DB,#9B59B6,#E74C3C);border-radius:3px 3px 0 0;margin:0 -24px;"></div>
  </div>
  <div class="summary">
    <div class="scard" style="border-color:#1D9E75;">
      <div class="scard-label">Receita da Organização</div>
      <div class="scard-value" style="color:#0F6E56;">${BRL(t.apm)}</div>
      <div class="scard-sub">Bruto: ${BRL(t.bruta)} · Parceiros: ${BRL(t.parc)}</div>
    </div>
    <div class="scard" style="border-color:#D85A30;">
      <div class="scard-label">Total Gastos</div>
      <div class="scard-value" style="color:#993C1D;">${BRL(t.gas)}</div>
      <div class="scard-sub">${S.gas.length} notas fiscais</div>
    </div>
    <div class="scard" style="border-color:${ok?"#378ADD":"#E24B4A"};">
      <div class="scard-label">Saldo Final</div>
      <div class="scard-value" style="color:${ok?"#185FA5":"#A32D2D"};">${BRL(t.saldo)}</div>
      <div class="scard-sub">${ok?"✅ Superávit":"⚠️ Déficit"}</div>
    </div>
  </div>
  <div class="tabs">${tabs.map(tb=>`<button class="tab${S.tab===tb.id?" active":""}" onclick="sT('${tb.id}')">${tb.l}</button>`).join("")}</div>
  <div class="content">${content}</div>`;
  bindER();bindEG();
  if(S.tab==="resumo") setTimeout(drawCharts,50);
}

/* ══════════════════════════════════════════════════
   GRÁFICOS
══════════════════════════════════════════════════ */
function drawCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch{}});charts={};
  if(typeof Chart==="undefined") return;
  Chart.register(ChartDataLabels);
  Chart.defaults.font.family="'Segoe UI',Arial,sans-serif";

  const byTRec={};S.rec.forEach(r=>{byTRec[r.tipo]=(byTRec[r.tipo]||0)+r.apm;});
  const pieREntries=Object.entries(byTRec).filter(([,v])=>v>0);
  const peEl=document.getElementById("pieR");
  if(peEl&&pieREntries.length) charts.pieR=new Chart(peEl,{type:"doughnut",data:{
    labels:pieREntries.map(([k])=>TBADGE[k]?.label||k),
    datasets:[{data:pieREntries.map(([,v])=>v),backgroundColor:pieREntries.map(([k])=>REC_COLORS[k]||"#aaa"),borderWidth:3,borderColor:"#fff"}]
  },options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{
    legend:{display:false},
    tooltip:{callbacks:{label:c=>" "+BRL(c.raw)}},
    datalabels:{color:"#fff",font:{weight:"bold",size:12},formatter:v=>{
      const tot=pieREntries.reduce((a,[,x])=>a+x,0);const pct=(v/tot)*100;
      return pct>8?pct.toFixed(0)+"%":"";
    }}
  }}});

  const byTGas={};S.gas.forEach(g=>{byTGas[g.tipo]=(byTGas[g.tipo]||0)+g.valor;});
  const GCOL={alimentacao:"#1D9E75",material:"#378ADD",decoracao:"#3B8C28",servico:"#EF9F27",premio:"#D85A30",estrutura:"#7D3C98",outro:"#888"};
  const gasEnt=Object.entries(byTGas).sort((a,b)=>b[1]-a[1]);
  const pgEl=document.getElementById("pieG");
  if(pgEl&&gasEnt.length) charts.pieG=new Chart(pgEl,{type:"doughnut",data:{
    labels:gasEnt.map(([k])=>TBADGE[k]?.label||k),
    datasets:[{data:gasEnt.map(([,v])=>r2(v)),backgroundColor:gasEnt.map(([k])=>GCOL[k]||"#888"),borderWidth:3,borderColor:"#fff"}]
  },options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{
    legend:{display:false},
    tooltip:{callbacks:{label:c=>" "+BRL(c.raw)}},
    datalabels:{color:"#fff",font:{weight:"bold",size:12},formatter:v=>{
      const tot=gasEnt.reduce((a,[,x])=>a+x,0);const pct=(v/tot)*100;
      return pct>8?pct.toFixed(0)+"%":"";
    }}
  }}});

  const bd=[...S.rec.filter(r=>r.tipo==="barraca")].sort((a,b)=>b.receitaBruta-a.receitaBruta);
  const brEl=document.getElementById("barR");
  if(brEl&&bd.length) charts.barR=new Chart(brEl,{type:"bar",data:{
    labels:bd.map(r=>r.responsavel.length>22?r.responsavel.substring(0,20)+"…":r.responsavel),
    datasets:[
      {label:"Receita bruta",data:bd.map(r=>r.receitaBruta),backgroundColor:"#EF9F27",borderRadius:5,barPercentage:0.85,categoryPercentage:0.78},
      {label:"Organização",data:bd.map(r=>r2(r.apm)),backgroundColor:"#1D9E75",borderRadius:5,barPercentage:0.85,categoryPercentage:0.78},
      {label:"Parceiro",data:bd.map(r=>r2(r.parceiro)),backgroundColor:"#9B59B6",borderRadius:5,barPercentage:0.85,categoryPercentage:0.78},
    ]
  },options:{
    indexAxis:"y",responsive:true,maintainAspectRatio:false,
    layout:{padding:{right:110,top:6,bottom:6}},
    plugins:{
      legend:{display:false},
      tooltip:{padding:12,callbacks:{label:c=>" "+c.dataset.label+": "+BRL(c.raw)}},
      datalabels:{
        anchor:"end",align:"right",clamp:false,clip:false,
        formatter:v=>v>0?fv(v):"",
        font:{weight:"bold",size:12},
        color:ctx=>["#BA7517","#0F6E56","#6C3483"][ctx.datasetIndex]||"#333",
        padding:{left:6}
      }
    },
    scales:{
      x:{grid:{color:"rgba(0,0,0,0.06)"},ticks:{font:{size:12},callback:v=>fv(v),color:"#888"},border:{display:false}},
      y:{grid:{display:false},ticks:{font:{size:13,weight:"600"},color:"#444"},border:{display:false}}
    }
  }});

  const t=tots();
  const ccEl=document.getElementById("compC");
  const compColors=["#1D9E75","#D85A30",t.saldo>=0?"#378ADD":"#E24B4A"];
  if(ccEl) charts.compC=new Chart(ccEl,{type:"bar",data:{
    labels:["Receita Organização","Total Gastos","Saldo Final"],
    datasets:[{data:[t.apm,t.gas,t.saldo],backgroundColor:compColors,borderRadius:8,barPercentage:0.55}]
  },options:{
    responsive:true,maintainAspectRatio:false,
    layout:{padding:{top:38}},
    plugins:{
      legend:{display:false},
      tooltip:{padding:12,callbacks:{label:c=>" "+BRL(c.raw)}},
      datalabels:{anchor:"end",align:"top",clamp:false,formatter:v=>BRL(v),font:{weight:"bold",size:14},color:ctx=>compColors[ctx.dataIndex]}
    },
    scales:{
      x:{grid:{display:false},ticks:{font:{size:13,weight:"600"},color:"#444"},border:{display:false}},
      y:{grid:{color:"rgba(0,0,0,0.06)"},ticks:{font:{size:12},callback:v=>fv(v),color:"#888"},border:{display:false}}
    }
  }});
}

      doc.autoTable({

        body:S.rec.map(r=>[r.responsavel,r.data,TBADGE[r.tipo]?.label||r.tipo,BRL(r.receitaBruta),r.pct+"%",BRL(r.apm),BRL(r.parceiro)]),
        foot:[["TOTAIS ("+S.rec.length+")","","",BRL(t.bruta),"",BRL(t.apm),BRL(t.parc)]],
        theme:"grid",styles:{fontSize:8,cellPadding:2.5,overflow:"linebreak"},
        headStyles:{fillColor:[30,158,117],textColor:255,fontStyle:"bold",fontSize:8},
        footStyles:{fillColor:[225,245,238],fontStyle:"bold",textColor:[8,80,65]},
        columnStyles:{0:{cellWidth:50},1:{cellWidth:18},2:{cellWidth:20},3:{cellWidth:22,halign:"right"},4:{cellWidth:12,halign:"center"},5:{cellWidth:22,halign:"right"},6:{cellWidth:22,halign:"right"}},
        alternateRowStyles:{fillColor:[250,254,252]},
      });
      y=doc.lastAutoTable.finalY+8;
    }
    if(S.gas.length){
      doc.setFontSize(12);doc.setFont("helvetica","bold");doc.setTextColor(153,60,29);doc.text("GASTOS",10,y);
      doc.autoTable({
        startY:y+3,

        body:S.gas.map(g=>[g.descricao.substring(0,60)+(g.descricao.length>60?"…":""),(g.fornecedor||"").substring(0,35),g.data,BRL(g.valor),TBADGE[g.tipo]?.label||g.tipo]),
        foot:[["TOTAL ("+S.gas.length+" lançamentos)","","",BRL(t.gas),""]],
        theme:"grid",styles:{fontSize:8,cellPadding:2.5,overflow:"linebreak"},
        headStyles:{fillColor:[216,90,48],textColor:255,fontStyle:"bold",fontSize:8},
        footStyles:{fillColor:[250,236,231],fontStyle:"bold",textColor:[153,60,29]},
        columnStyles:{0:{cellWidth:68},1:{cellWidth:42},2:{cellWidth:18},3:{cellWidth:24,halign:"right"},4:{cellWidth:18}},
        alternateRowStyles:{fillColor:[255,252,250]},
      });
      y=doc.lastAutoTable.finalY+10;
    }
    if(y>260){doc.addPage();y=20;}
    const rc=ok?[30,158,117]:[226,75,74];
    doc.setFillColor(ok?225:250,ok?245:236,ok?238:231);doc.roundedRect(10,y,W-20,22,3,3,"F");

    toast("✅ PDF exportado!");
  }catch(e){console.error(e);toast("Erro ao gerar PDF","#C0392B");}
};

/* ══════════════════════════════════════════════════
   EXPORTAR XLSX
══════════════════════════════════════════════════ */
window.exportXLSX=function(){
  try{
    if(typeof XLSX==="undefined"){toast("Biblioteca Excel não carregada","#C0392B");return;}
    const t=tots();const wb=XLSX.utils.book_new();
    const titulo=(S.cfg.nome||"EVENTO").toUpperCase()+(S.cfg.org?" · "+S.cfg.org:"");
    const recRows=[
      ["RECEITAS — "+titulo,"","","","","",""],
      ["Gerado em "+now(),"","","","","",""],
      [],
      ["Fonte / Responsável","Data","Tipo","Receita Bruta (R$)","% Org.","Organização (R$)","Parceiro (R$)"],
      ...S.rec.map(r=>[r.responsavel,r.data,TBADGE[r.tipo]?.label||r.tipo,r.receitaBruta,r.pct/100,r.apm,r.parceiro]),
      [],
      ["TOTAIS","","",t.bruta,"",t.apm,t.parc],
    ];
    const wsRec=XLSX.utils.aoa_to_sheet(recRows);
    wsRec["!cols"]=[{wch:42},{wch:12},{wch:14},{wch:18},{wch:10},{wch:18},{wch:18}];
    for(let i=4;i<4+S.rec.length;i++){
      [3,5,6].forEach(c=>{const cell=XLSX.utils.encode_cell({r:i,c});if(wsRec[cell])wsRec[cell].z='#,##0.00';});
      const p=XLSX.utils.encode_cell({r:i,c:4});if(wsRec[p])wsRec[p].z="0%";
    }
    XLSX.utils.book_append_sheet(wb,wsRec,"Receitas");
    const gasRows=[
      ["GASTOS — "+titulo,"","","","",""],
      ["Gerado em "+now(),"","","","",""],
      [],
      ["Descrição","Fornecedor","Data","Valor (R$)","Tipo","Origem"],
      ...S.gas.map(g=>[g.descricao,g.fornecedor,g.data,g.valor,TBADGE[g.tipo]?.label||g.tipo,g.origem||""]),
      [],
      ["TOTAL GASTOS","","",t.gas,"",""],
    ];
    const wsGas=XLSX.utils.aoa_to_sheet(gasRows);
    wsGas["!cols"]=[{wch:55},{wch:40},{wch:12},{wch:18},{wch:14},{wch:22}];
    for(let i=4;i<4+S.gas.length;i++){const c=XLSX.utils.encode_cell({r:i,c:3});if(wsGas[c])wsGas[c].z='#,##0.00';}
    XLSX.utils.book_append_sheet(wb,wsGas,"Gastos");
    const byT2={};S.gas.forEach(g=>{byT2[g.tipo]=(byT2[g.tipo]||0)+g.valor;});
    const resRows=[
      ["BALANÇO CONSOLIDADO — "+titulo,""],
      ["Gerado em "+now(),""],
      [],
      ["RECEITAS",""],["Receita bruta total",t.bruta],["Receita da organização",t.apm],["Total parceiros",t.parc],
      [],
      ["GASTOS",""],["Total de gastos",t.gas],["Número de notas",S.gas.length],
      [],
      ["RESULTADO",""],["Saldo final",t.saldo],["Resultado",t.saldo>=0?"SUPERÁVIT":"DÉFICIT"],
      [],
      ["GASTOS POR TIPO",""],["Tipo","Valor (R$)"],
      ...Object.entries(byT2).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[TBADGE[k]?.label||k,v]),
    ];
    const wsRes=XLSX.utils.aoa_to_sheet(resRows);
    wsRes["!cols"]=[{wch:32},{wch:20}];
    XLSX.utils.book_append_sheet(wb,wsRes,"Resumo");
    XLSX.writeFile(wb,"Balanco_"+(S.cfg.nome||"Evento").replace(/\s+/g,"_")+".xlsx");
    toast("✅ Excel exportado!");
  }catch(e){console.error(e);toast("Erro ao gerar Excel","#C0392B");}
};

window.sT=t=>{S.tab=t;render();};
window.sER=id=>{S.erI=id;S.erD={...S.rec.find(r=>r.id===id)};render();};
window.saveR=()=>{S.rec=S.rec.map(r=>r.id===S.erI?S.erD:r);S.erI=null;S.erD=null;saveData();render();toast("Receita atualizada!");};
window.cancelR=()=>{S.erI=null;S.erD=null;render();};
window.delR=id=>{if(confirm("Remover esta receita?")){S.rec=S.rec.filter(r=>r.id!==id);saveData();render();toast("Receita removida");}};
window.setNrTipo=tp=>{S.nr.tipo=tp;if(tp==="sorteio"||tp==="ingresso"||tp==="doacao")S.nr.pct=100;render();};
window.clearNr=()=>{S.nr={responsavel:"",data:"",receitaBruta:"",pct:25,tipo:"barraca"};render();};
window.addR=()=>{
  const resp=document.getElementById("nr-resp")?.value||"";
  const data=document.getElementById("nr-data")?.value||"—";
  const rb=parseFloat(document.getElementById("nr-rb")?.value)||0;
  const pct=parseFloat(document.getElementById("nr-pct-num")?.value)||0;
  if(!resp||rb<=0){alert("Preencha responsável e receita bruta.");return;}
  S.rec=[...S.rec,{id:S.nextId++,responsavel:resp,data,receitaBruta:rb,parceiro:r2(rb*(100-pct)/100),apm:r2(rb*pct/100),pct,tipo:S.nr.tipo}];
  S.nr={responsavel:"",data:"",receitaBruta:"",pct:25,tipo:"barraca"};
  saveData();render();toast("✅ Receita adicionada e salva!");
};
window.updPreview=function(){
  const rb=parseFloat(S.nr.receitaBruta)||0;
  const pct=parseFloat(S.nr.pct)||0;
  const get=id=>document.getElementById(id);
  if(get("prev-rb")) get("prev-rb").textContent=BRL(rb);
  if(get("prev-apm")){get("prev-apm").textContent=BRL(r2(rb*pct/100));get("prev-apm-lbl").textContent=`Organização recebe (${pct}%)`;}
  if(get("prev-parc")){get("prev-parc").textContent=BRL(r2(rb*(100-pct)/100));get("prev-parc-lbl").textContent=`Parceiro recebe (${100-pct}%)`;}
  if(get("nr-pct-lbl")) get("nr-pct-lbl").textContent=pct+"%";
  if(get("nr-parc-pct-lbl")) get("nr-parc-pct-lbl").textContent=(100-pct)+"%";
};
window.sEG=id=>{S.egI=id;S.egD={...S.gas.find(g=>g.id==id)};render();};
window.saveG=()=>{S.gas=S.gas.map(g=>g.id===S.egI?S.egD:g);S.egI=null;S.egD=null;saveData();render();toast("Gasto atualizado!");};
window.cancelG=()=>{S.egI=null;S.egD=null;render();};
window.delG=id=>{if(confirm("Remover este lançamento?")){S.gas=S.gas.filter(g=>g.id!=id);saveData();render();toast("Gasto removido");}};
window.addM=()=>{
  const desc=document.getElementById("nd")?.value||"";
  const forn=document.getElementById("nf")?.value||"";
  const data=document.getElementById("ndt")?.value||"—";
  const valor=parseFloat(document.getElementById("nv")?.value)||0;
  const tipo=document.getElementById("nt")?.value||"outro";
  if(!desc&&!valor) return;
  S.gas=[...S.gas,{id:"m"+Date.now(),descricao:desc||"Sem descrição",fornecedor:forn||"—",valor,data,tipo,origem:"Manual"}];
  S.ng={desc:"",forn:"",data:"",valor:"",tipo:"material"};
  saveData();render();toast("✅ Gasto adicionado e salvo!");
};
window.hF=async files=>{
  if(!files?.length) return;
  for(const f of Array.from(files)){
    S.proc++;render();
    await new Promise(res=>{
      const rd=new FileReader();
      rd.onloadend=async()=>{
        const b64=rd.result.split(",")[1];
        try{
          const rp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:f.type||"image/jpeg",data:b64}},{type:"text",text:'Analise o recibo. Retorne SOMENTE JSON válido: {"descricao":"desc breve","fornecedor":"estabelecimento","valor":0.00,"data":"DD/MM/YYYY ou null","tipo":"alimentacao|material|decoracao|servico|premio|estrutura|outro"}'}]}]})});
          const d=await rp.json();
          const p=JSON.parse((d.content?.[0]?.text||"{}").replace(/```json\n?|```/g,"").trim());
          S.gas=[...S.gas,{id:"ai"+Date.now(),descricao:p.descricao||f.name,fornecedor:p.fornecedor||"—",valor:r2(p.valor)||0,data:p.data||"—",tipo:p.tipo||"outro",origem:"IA — "+f.name}];
          saveData();toast("✅ Recibo processado: "+f.name);
        }catch{
          S.gas=[...S.gas,{id:"ai"+Date.now(),descricao:"Recibo — "+f.name,fornecedor:"Verificar manualmente",valor:0,data:"—",tipo:"outro",origem:f.name}];
          saveData();
        }
        S.proc--;render();res();
      };rd.readAsDataURL(f);
    });
  }
};

window.addEventListener("beforeunload",()=>{try{if(S.cfg.configured)saveData();}catch{}});
render();
</script>
